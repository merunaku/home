<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla de Posiciones - Normativa e Instrumentación</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
            color: #333;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #1e293b;
        }

        /* Contenedor Flexbox para poner las dos tablas lado a lado */
        .contenedor-tablas {
            display: flex;
            gap: 25px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap; /* Permite que en celulares se muestre una debajo de otra */
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Tarjeta que envuelve a cada tabla */
        .tabla-card {
            flex: 1;
            min-width: 320px;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .tabla-card h2 {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.3rem;
            color: #0f172a;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 8px;
        }

        .loading {
            text-align: center;
            font-size: 1em;
            color: #64748b;
            padding: 20px 0;
        }

        .error {
            color: #ef4444;
            text-align: center;
            font-weight: bold;
            font-size: 0.9em;
            padding: 10px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 10px 12px;
            text-align: center;
            font-size: 0.95rem;
        }

        th {
            background-color: #1e293b;
            color: white;
            font-weight: 600;
        }

        tr:nth-child(even) {
            background-color: #f8fafc;
        }

        tr:hover {
            background-color: #f1f5f9;
        }

        .posicion {
            font-weight: bold;
            width: 50px;
        }

        .nombre {
            text-align: left;
        }

        .nota {
            font-weight: bold;
            color: #16a34a;
        }

        .tiempo {
            color: #475569;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <h1>🏆 Tablas de Posiciones</h1>

    <div class="contenedor-tablas">

        <!-- TABLA 1: NORMATIVA -->
        <div class="tabla-card">
            <h2>📜 Normativa</h2>
            <div id="loading-normativa" class="loading">Cargando datos...</div>
            <div id="error-normativa" class="error"></div>
            
            <table id="tabla-normativa" style="display: none;">
                <thead>
                    <tr>
                        <th>#</th>
                        <th style="text-align: left;">Nombre</th>
                        <th>Nota</th>
                        <th>Puntaje</th>
                        <th>Tiempo</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-normativa"></tbody>
            </table>
        </div>

        <!-- TABLA 2: INSTRUMENTACIÓN -->
        <div class="tabla-card">
            <h2>⚙️ Instrumentación</h2>
            <div id="loading-instrumentacion" class="loading">Cargando datos...</div>
            <div id="error-instrumentacion" class="error"></div>
            
            <table id="tabla-instrumentacion" style="display: none;">
                <thead>
                    <tr>
                        <th>#</th>
                        <th style="text-align: left;">Nombre</th>
                        <th>Nota</th>
                        <th>Puntaje</th>
                        <th>Tiempo</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-instrumentacion"></tbody>
            </table>
        </div>

    </div>

    <script>
        // URLs de tus dos Web Apps de Google Apps Script
        const URL_NORMATIVA = "https://script.google.com/macros/s/AKfycbwMC0t6JF4bqocgi1D1msvnC0iEg5V6lURmQGB0bkNNLM1f099VD7y0vz7mHUftLk9Q0Q/exec";
        const URL_INSTRUMENTACION = "https://script.google.com/macros/s/AKfycbxfAYkuxXaXYLOuuJvC6IKO4NujyVM3X-NrVRa9sQJomJsT8HQ9NRNZawLoxVaD38jb/exec";

        // Función principal para cargar y procesar una tabla
        async function cargarTabla(url, loadingId, errorId, tablaId, cuerpoId) {
            const loadingEl = document.getElementById(loadingId);
            const errorEl = document.getElementById(errorId);
            const tablaEl = document.getElementById(tablaId);
            const cuerpoEl = document.getElementById(cuerpoId);

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Error de conexión con Google Sheets");

                let data = await response.json();

                loadingEl.style.display = "none";

                if (!data || data.length === 0) {
                    loadingEl.innerText = "No hay registros disponibles.";
                    loadingEl.style.display = "block";
                    return;
                }

                // ORDENAMIENTO EN EL CLIENTE:
                // 1. Mayor Nota primero
                // 2. Si las notas son iguales, Menor Tiempo primero
                data.sort((a, b) => {
                    // Convertir nota a número flotante (soporta comas o puntos)
                    const notaA = parseFloat(String(a.nota || 0).replace(',', '.'));
                    const notaB = parseFloat(String(b.nota || 0).replace(',', '.'));

                    if (notaB !== notaA) {
                        return notaB - notaA; // Mayor nota arriba
                    }

                    // Desempate por tiempo (normalizamos tiempo ej: "1:20" -> "01:20")
                    const tiempoA = String(a.tiempo || "99:99").trim().padStart(5, '0');
                    const tiempoB = String(b.tiempo || "99:99").trim().padStart(5, '0');

                    return tiempoA.localeCompare(tiempoB); // Menor tiempo arriba
                });

                // Renderizar las filas con medallas para los 3 primeros
                cuerpoEl.innerHTML = data.map((item, index) => {
                    let medalla = index + 1;
                    if (index === 0) medalla = "🥇";
                    else if (index === 1) medalla = "🥈";
                    else if (index === 2) medalla = "🥉";

                    return `
                        <tr>
                            <td class="posicion">${medalla}</td>
                            <td class="nombre">${escaparHTML(item.nombre)}</td>
                            <td class="nota">${item.nota}</td>
                            <td>${item.puntaje ?? '-'}</td>
                            <td class="tiempo">${item.tiempo || '-'}</td>
                        </tr>
                    `;
                }).join('');

                tablaEl.style.display = "table";

            } catch (err) {
                loadingEl.style.display = "none";
                errorEl.innerText = "No se pudieron cargar los datos.";
                console.error(err);
            }
        }

        // Función de seguridad contra inyección de HTML
        function escaparHTML(texto) {
            const div = document.createElement('div');
            div.innerText = texto || '';
            return div.innerHTML;
        }

        // Cargar ambas tablas simultáneamente
        cargarTabla(URL_NORMATIVA, "loading-normativa", "error-normativa", "tabla-normativa", "cuerpo-normativa");
        cargarTabla(URL_INSTRUMENTACION, "loading-instrumentacion", "error-instrumentacion", "tabla-instrumentacion", "cuerpo-instrumentacion");
    </script>

</body>
</html>
